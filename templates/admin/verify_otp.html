<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | ShopCart</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cursor.css') }}">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family: 'Amazon Ember', Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: url(https://gradient.page/_next/image?url=%2Fcdn%2Fgreen-glory%2Fgreen-glory-026.jpg&w=1920&q=75) center/cover fixed;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#111;
            padding:2rem 1rem;
            backdrop-filter: blur(8px);
        }

        .auth-page { width:100%; display:flex; align-items:center; justify-content:center; }

        .auth-card {
            background: #ffffffcc;
            border-radius:10px;
            border:1px solid #e6e6e6;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            width:100%;
            max-width:420px;
            padding:2rem;
        }

        .auth-logo { text-align:center; margin-bottom:1.25rem; }
        .brand { font-size:1.6rem; font-weight:900; color:#131921; }
        .brand span { color:#ff9900; }

        .auth-title { text-align:center; font-size:1.25rem; font-weight:700; margin:0.25rem 0 0.75rem; }
        .auth-sub { text-align:center; font-size:0.9rem; color:#666; margin-bottom:1rem; }

        .form-group { margin-bottom:1rem; }
        .form-label { display:block; font-size:0.85rem; font-weight:700; color:#111; margin-bottom:0.4rem; }

        .form-control {
            width:100%;
            padding:0.75rem;
            border:1px solid #cfcfcf;
            border-radius:6px;
            font-size:0.95rem;
            background:transparent;
        }

        .form-control:focus { outline:none; border-color:#ff9900; box-shadow:0 0 0 4px rgba(255,153,0,0.08); }

        input[name="otp"] { letter-spacing:6px; font-size:1.15rem; text-align:center; }

        .btn { display:inline-block; cursor:pointer; border-radius:4px; text-align:center; font-weight:700; }
        .btn-full { width:100%; }
        .btn-lg { padding:0.85rem; font-size:0.95rem; }
        .btn-amazon {
            background: linear-gradient(to bottom,#f7dfa5,#f0c14b);
            border:1px solid #a88734; color:#111;
        }
        .btn-amazon:hover { filter:brightness(0.98); }

        .auth-footer { text-align:center; margin-top:1rem; }
        .auth-footer a { color:#cc0011; text-decoration:none; font-weight:600; }

        .alert { padding:10px 12px; border-radius:4px; margin-bottom:1rem; font-size:0.9rem; }
        .alert-success { background:#e8f5e9; color:#1b5e20; border-left:4px solid #2e7d32; }
        .alert-danger { background:#ffebee; color:#b71c1c; border-left:4px solid #c62828; }

        @media (max-width:600px) {
            .auth-card { padding:1.25rem; max-width:100%; }
            .brand { font-size:1.3rem; }
            .auth-title { font-size:1.05rem; }
            input[name="otp"] { letter-spacing:4px; font-size:1.05rem; }
        }

        @media (max-width:400px) {
            .form-label { font-size:0.8rem; }
            .btn-lg { padding:0.7rem; }
        }
    </style>
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand">🛒 Shop<span>Cart</span></div>
        </div>

        <div style="text-align:center;margin-bottom:0.75rem;">
            <div style="font-size:2.25rem;">📩</div>
            <h2 class="auth-title">Verify OTP</h2>
            <p class="auth-sub">Enter the OTP sent to your email and create your password.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/verify-otp">
            <div class="form-group">
                <label class="form-label">OTP Code <span class="required">*</span></label>
                <input type="text" name="otp" class="form-control" placeholder="•• •• ••" maxlength="6" required>
            </div>

            <div class="form-group">
                <label class="form-label">Create Password <span class="required">*</span></label>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" minlength="6" required>
            </div>

            <button type="submit" class="btn btn-amazon btn-full btn-lg">Verify & Register</button>
        </form>

        <div class="auth-footer">
            <a href="/admin-signup">← Go back</a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/cursor.js') }}"></script>
</body>
</html>
