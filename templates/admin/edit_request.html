{% extends "admin/base_admin.html" %}
{% block title %}Edit Request{% endblock %}
{% block page_title %}Edit Admin Request{% endblock %}

{% block content %}
<div style="max-width:680px;">
    <div class="card">
        <div class="card-header"><span class="card-title">✏️ Edit Registration Request</span></div>
        <div class="card-body">
            <form method="POST" action="/admin/edit-request/{{ req.request_id }}">
                <div class="form-group">
                    <label class="form-label">Full Name <span class="required">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ req.name }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" value="{{ req.email }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" value="{{ req.phone or '' }}" placeholder="Optional phone number">
                </div>
                <div class="form-group">
                    <label class="form-label">Password <span style="font-size:0.75rem;font-weight:400;color:var(--gray-500);">(leave blank to keep current)</span></label>
                    <input type="password" name="password" class="form-control" placeholder="Enter new password to reset">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                <a href="/admin/requests" class="btn btn-outline" style="margin-left:0.5rem;">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
